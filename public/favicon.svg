<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Brutalist style: black square with thick border and white S -->
  <rect x="0" y="0" width="128" height="128" rx="0" fill="#000000"/>
  <rect x="8" y="8" width="112" height="112" rx="0" fill="#000000" stroke="#000000" stroke-width="8"/>

  <!-- Letter S in brutalist style -->
  <text x="64" y="90" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">S</text>
</svg>